{% extends 'base.html' %}
{% block title %}Register - HealthAI{% endblock %}
{% block content %}

<div style="max-width:560px; margin:40px auto;">
    <div class="card">
        <div style="text-align:center; margin-bottom:28px;">
            <div class="feature-icon" style="margin:0 auto 16px;">
                <i class="fas fa-user-plus"></i>
            </div>
            <h2 style="margin-bottom:4px;">Create Account</h2>
            <p style="opacity:0.6; font-size:0.9rem; margin:0;">Join HealthAI to start predicting disease risks</p>
        </div>

        <form action="{% url 'save' %}" method="post">
            {% csrf_token %}
            <div class="grid grid-2" style="gap:14px;">
                <div class="form-group" style="margin-bottom:0;">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Username" required>
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Password" required>
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="Email" required>
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label>Age</label>
                    <input type="number" name="age" placeholder="Age" required min="1" max="120">
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label>Gender</label>
                    <input type="text" name="gender" placeholder="Gender" required>
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label>Phone Number</label>
                    <input type="text" name="phone" placeholder="Phone" required>
                </div>
            </div>
            <div class="form-group" style="margin-top:14px;">
                <label>Address</label>
                <input type="text" name="address" placeholder="Address" required>
            </div>
            <button type="submit" style="width:100%; margin-top:8px;">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>

        <p style="text-align:center; margin-top:20px; font-size:0.9rem; opacity:0.75;">
            Already have an account?
            <a href="{% url 'login' %}" style="color:var(--accent); font-weight:600;">Login here</a>
        </p>
    </div>
</div>

{% endblock %}
