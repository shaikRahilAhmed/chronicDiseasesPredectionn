{% extends 'base.html' %}
{% block title %}Prediction Result - HealthAI{% endblock %}
{% block content %}

<div style="max-width:520px; margin:40px auto;">
    <div class="card" style="text-align:center;">
        <div class="feature-icon" style="margin:0 auto 20px;">
            <i class="fas fa-clipboard-check"></i>
        </div>
        <h2>Prediction Result</h2>

        <div style="margin:28px 0;">
            <p style="opacity:0.6; font-size:0.85rem; margin-bottom:8px; text-transform:uppercase; letter-spacing:1px;">Predicted Outcome</p>
            <div style="font-size:clamp(1.6rem,5vw,2.4rem); font-weight:700; color:var(--accent2); padding:16px; background:rgba(255,154,158,0.1); border-radius:12px; border:1px solid rgba(255,154,158,0.25);">
                {{ predictedvalue }}
            </div>
        </div>

        <div class="result-box" style="margin:20px 0;">
            <p style="opacity:0.6; font-size:0.8rem; margin-bottom:6px; text-transform:uppercase; letter-spacing:1px;">Model Accuracy</p>
            <div class="accuracy-value">
                {% if accuracy %}{{ accuracy }}{% else %}—{% endif %}
            </div>
        </div>

        <div style="display:flex; gap:12px; margin-top:8px;" class="btn-row">
            <a href="{% url 'home' %}" class="btn" style="flex:1;">
                <i class="fas fa-home"></i> Dashboard
            </a>
        </div>
    </div>
</div>

{% endblock %}
